<template>
   <div class={tileClass}>
        <p class="slds-text-heading_small">{serviceName}</p>

        <p class="slds-m-top_x-small">
            {serviceDescription}
        </p>

        <div class="slds-m-top_small">
            <lightning-badge label={serviceStatus}></lightning-badge>
        </div>

        <div class="slds-m-top_medium">
            <lightning-button
                label={buttonLabel}
                variant="brand"
                onclick={handleSelect}>
            </lightning-button>
        </div>
    </div>
</template>
