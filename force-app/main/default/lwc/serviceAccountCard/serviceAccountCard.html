<template>
    <div class={cardClass}>
        <p class="slds-text-heading_small">{account.Name}</p>

        <p class="slds-m-top_x-small">
            <strong>Phone:</strong> {displayPhone}
        </p>

        <p>
            <strong>Website:</strong> {displayWebsite}
        </p>

        <div class="slds-m-top_medium">
            <lightning-button
                label={buttonLabel}
                variant={buttonVariant}
                onclick={handleSelect}>
            </lightning-button>
        </div>
    </div>
</template>
