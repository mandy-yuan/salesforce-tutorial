<template>
    <lightning-card title="Account Search" icon-name="standard:account">
        <div class="slds-p-around_medium">
            <p class="slds-text-body_regular">
                Search Accounts by name, industry, or type. This component calls Apex from LWC.
            </p>

            <div class="slds-m-top_medium">
                <lightning-input
                    type="text"
                    label="Search term"
                    placeholder="Example: Acme, Retail, Healthcare"
                    value={searchTerm}
                    onchange={handleSearchTermChange}>
                </lightning-input>
            </div>

            <div class="slds-m-top_medium">
                <lightning-button
                    label="Wired Search"
                    variant="brand"
                    onclick={handleWiredSearch}>
                </lightning-button>

                <lightning-button
                    class="slds-m-left_small"
                    label="Imperative Search"
                    variant="neutral"
                    onclick={handleImperativeSearch}>
                </lightning-button>

                <lightning-button
                    class="slds-m-left_small"
                    label="Clear"
                    variant="destructive-text"
                    onclick={handleClear}>
                </lightning-button>
            </div>

            <div class="slds-m-top_medium">
                <lightning-badge label={searchModeLabel}></lightning-badge>
                <lightning-badge class="slds-m-left_x-small" label={resultCountLabel}></lightning-badge>
            </div>

            <template lwc:if={isLoading}>
                <div class="slds-m-top_medium">
                    <lightning-spinner
                        alternative-text="Searching Accounts"
                        size="medium">
                    </lightning-spinner>
                </div>
            </template>

            <template lwc:if={errorMessage}>
                <div class="slds-box slds-theme_error slds-m-top_medium">
                    <p>{errorMessage}</p>
                </div>
            </template>

            <template lwc:if={hasResults}>
                <div class="slds-m-top_medium">
                    <template for:each={accounts} for:item="account">
                        <div key={account.Id} class="slds-box slds-m-bottom_small">
                            <p class="slds-text-heading_small">{account.Name}</p>

                            <p class="slds-m-top_x-small">
                                <strong>Industry:</strong> {account.Industry}
                            </p>

                            <p>
                                <strong>Type:</strong> {account.Type}
                            </p>

                            <p>
                                <strong>Phone:</strong> {account.Phone}
                            </p>

                            <template lwc:if={account.Website}>
                                <p>
                                    <strong>Website:</strong> {account.Website}
                                </p>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

            <template lwc:elseif={hasSearched}>
                <div class="slds-box slds-m-top_medium">
                    <p>No matching Accounts found.</p>
                </div>
            </template>

            <template lwc:else>
                <div class="slds-box slds-m-top_medium">
                    <p>Enter at least 2 characters, then choose Wired Search or Imperative Search.</p>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
