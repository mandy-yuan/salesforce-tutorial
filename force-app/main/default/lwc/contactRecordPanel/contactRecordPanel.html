<template>
    <lightning-card title="Contact Record Panel" icon-name="standard:contact">
        <div class="slds-p-around_medium">
            <template lwc:if={contact.data}>
                <div class="slds-box slds-m-bottom_medium">
                    <p class="slds-text-heading_small">{contactName}</p>

                    <p class="slds-m-top_small">
                        <strong>Email:</strong> {contactEmail}
                    </p>

                    <p>
                        <strong>Phone:</strong> {contactPhone}
                    </p>

                    <p>
                        <strong>Title:</strong> {contactTitle}
                    </p>
                </div>

                <p class="slds-text-heading_small slds-m-bottom_small">
                    Edit Contact
                </p>

                <lightning-record-form
                    record-id={recordId}
                    object-api-name="Contact"
                    fields={editableFields}
                    columns="2"
                    mode="edit"
                    onsuccess={handleSuccess}>
                </lightning-record-form>
            </template>

            <template lwc:elseif={contact.error}>
                <div class="slds-box slds-theme_error">
                    <p>Unable to load this Contact record.</p>
                    <p>{errorMessage}</p>
                </div>
            </template>

            <template lwc:else>
                <lightning-spinner
                    alternative-text="Loading contact data"
                    size="medium">
                </lightning-spinner>
            </template>
        </div>
    </lightning-card>
</template>
